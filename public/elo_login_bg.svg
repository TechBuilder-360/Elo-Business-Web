<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>

    <!-- Glowing Radial Gradients -->
    <radialGradient id="glowPrimary" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowSecondary" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowAccent" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0" />
    </radialGradient>

    <!-- Card Glassmorphism Vibe -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="1000" height="1000" fill="url(#bgGrad)" />

  <!-- Ambient Glows -->
  <rect width="1000" height="1000" fill="url(#glowPrimary)" />
  <rect width="1000" height="1000" fill="url(#glowSecondary)" />
  <rect width="1000" height="1000" fill="url(#glowAccent)" />

  <!-- Overlay Grid -->
  <rect width="1000" height="1000" fill="url(#grid)" />

  <!-- Geometric Abstract Network Lines (Circuit-like) -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" fill="none">
    <!-- Diagonal and horizontal network routes -->
    <path d="M -100 200 L 300 200 L 450 350 L 800 350 L 900 450 L 1100 450" />
    <path d="M 200 1100 L 200 800 L 350 650 L 700 650 L 850 500 L 1100 500" />
    <path d="M 100 -100 L 100 300 L 250 450 L 250 700" />
    <path d="M 900 1100 L 900 750 L 750 600 L 500 600 M 500 600 L 400 500" />
  </g>

  <!-- Neon Glowing Lines -->
  <g fill="none" stroke-width="2">
    <!-- Indigo glow line -->
    <path d="M 150 200 L 300 200 L 450 350 L 700 350" stroke="#6366f1" stroke-opacity="0.4" />
    <!-- Cyan glow line -->
    <path d="M 300 800 L 350 650 L 700 650 L 800 550" stroke="#06b6d4" stroke-opacity="0.4" />
    <!-- Fuchsia highlight -->
    <path d="M 250 450 L 250 600 L 350 700" stroke="#d946ef" stroke-opacity="0.3" />
  </g>

  <!-- Glowing Nodes/Points -->
  <g fill="#ffffff">
    <circle cx="300" cy="200" r="4" fill="#6366f1" opacity="0.8" />
    <circle cx="450" cy="350" r="3" fill="#6366f1" opacity="0.8" />
    <circle cx="350" cy="650" r="4" fill="#06b6d4" opacity="0.8" />
    <circle cx="700" cy="650" r="3" fill="#06b6d4" opacity="0.8" />
    <circle cx="250" cy="450" r="3.5" fill="#d946ef" opacity="0.7" />
    <circle cx="250" cy="600" r="3" fill="#d946ef" opacity="0.7" />
  </g>

  <!-- Floating Abstract Tech Shapes -->
  <g transform="translate(450, 400)">
    <!-- Big Hexagon -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="url(#cardGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />
    
    <!-- Medium Hexagon nested -->
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
    
    <!-- Inner glowing core -->
    <polygon points="0,-40 34,-20 34,20 0,40 -34,20 -34,-20" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.5" stroke-width="2" />
    
    <!-- Pulse ring -->
    <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" fill="none" stroke="#06b6d4" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="10 15" />
  </g>

  <!-- More Background Particles -->
  <g opacity="0.6">
    <circle cx="150" cy="150" r="1.5" fill="#ffffff" />
    <circle cx="850" cy="150" r="2" fill="#ffffff" />
    <circle cx="750" cy="850" r="1.5" fill="#ffffff" />
    <circle cx="200" cy="800" r="2" fill="#ffffff" />
    <circle cx="500" cy="150" r="1" fill="#ffffff" />
    <circle cx="550" cy="880" r="2.5" fill="#ffffff" />
  </g>
</svg>
